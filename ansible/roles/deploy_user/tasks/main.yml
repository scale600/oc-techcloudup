# ============================================================================
# Deploy User Role — Tasks
# ============================================================================
# Creates deploy user for GitHub Actions CI/CD.
# Restricted sudo: only cp, chown, systemctl reload nginx.
# ============================================================================

- name: Create deploy user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    state: present
    shell: /bin/bash
    create_home: true
    home: /home/{{ deploy_user }}
    groups: "{{ nginx_user }}"
    append: true

- name: Create .ssh directory
  ansible.builtin.file:
    path: /home/{{ deploy_user }}/.ssh
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: Add deploy SSH authorized key
  ansible.builtin.copy:
    content: "{{ deploy_ssh_key }}"
    dest: /home/{{ deploy_user }}/.ssh/authorized_keys
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"

- name: Create restricted sudoers for deploy user
  ansible.builtin.copy:
    content: |
      # GitHub Actions deploy user — restricted commands only
      {{ deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/cp -r /tmp/oc-platform/* /var/www/oc-platform/
      {{ deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/chown -R nginx:nginx /var/www/oc-platform
      {{ deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/systemctl reload nginx
      {{ deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/mkdir -p /tmp/oc-platform
      {{ deploy_user }} ALL=(ALL) NOPASSWD: /usr/bin/chown -R deploy:deploy /tmp/oc-platform
    dest: /etc/sudoers.d/deploy
    owner: root
    group: root
    mode: "0440"
    validate: /usr/sbin/visudo -cf %s

- name: Set tmp directory permissions
  ansible.builtin.file:
    path: /tmp/oc-platform
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
