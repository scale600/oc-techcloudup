# ============================================================================
# Nginx Role — Tasks
# ============================================================================
# Installs Nginx, deploys site config, serves static files from webroot.
# Runs on web group (oc-a1).
# ============================================================================

- name: Install Nginx (dnf)
  ansible.builtin.dnf:
    name: nginx
    state: present
  when: ansible_os_family == "RedHat"
  tags: [nginx]

- name: Install Nginx (apt)
  ansible.builtin.apt:
    name: nginx
    state: present
  when: ansible_os_family == "Debian"
  tags: [nginx]

- name: Remove default server block (dnf)
  ansible.builtin.file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  when: ansible_os_family == "RedHat"
  notify: Reload Nginx

- name: Remove default site (apt)
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  when: ansible_os_family == "Debian"
  notify: Reload Nginx

- name: Create webroot directory
  ansible.builtin.file:
    path: "{{ webroot }}"
    state: directory
    owner: "{{ nginx_user }}"
    group: "{{ nginx_user }}"
    mode: "0755"

- name: Deploy Nginx site config
  ansible.builtin.template:
    src: oc-platform.conf.j2
    dest: "{{ nginx_conf_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx
  tags: [config]

- name: Deploy health check page
  ansible.builtin.copy:
    content: "OK"
    dest: "{{ webroot }}/health"
    owner: "{{ nginx_user }}"
    group: "{{ nginx_user }}"
    mode: "0644"

- name: Start and enable Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true

- name: Verify Nginx is responding
  ansible.builtin.uri:
    url: "http://localhost/health"
    return_content: true
  register: health_check
  until: health_check.status == 200
  retries: 5
  delay: 3
  tags: [verify]
