#cloud-config
# ============================================================================
# cloud-init for oc-monitor — Uptime Kuma + Nginx Reverse Proxy
# Ubuntu 24.04 (AMD, E2.1.Micro)
# ============================================================================

# Update all packages on first boot
package_update: true
package_upgrade: true

packages:
  - nginx
  - certbot
  - python3-certbot-nginx
  - apt-transport-https
  - ca-certificates
  - curl

# Write Nginx reverse proxy config
write_files:
  - path: /etc/nginx/sites-available/uptime-kuma
    permissions: "0644"
    owner: root:root
    content: |
      server {
          listen 80;
          server_name _;

          # Uptime Kuma dashboard
          location / {
              proxy_pass http://127.0.0.1:3001;
              proxy_http_version 1.1;
              proxy_set_header Upgrade $http_upgrade;
              proxy_set_header Connection "upgrade";
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_read_timeout 86400;
          }
      }

# Run commands
runcmd:
  # --- Docker installation ---
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update -y
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # --- Uptime Kuma ---
  - docker volume create uptime-kuma-data
  - docker run -d --restart=always --name uptime-kuma -p 3001:3001 -v uptime-kuma-data:/app/data louislam/uptime-kuma:1

  # --- Nginx reverse proxy ---
  - ln -sf /etc/nginx/sites-available/uptime-kuma /etc/nginx/sites-enabled/
  - rm -f /etc/nginx/sites-enabled/default
  - nginx -t
  - systemctl enable nginx
  - systemctl restart nginx

  # --- Firewall (ufw) ---
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

final_message: "oc-monitor bootstrap complete — Uptime Kuma on :3001, Nginx on :80"
